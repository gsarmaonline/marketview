services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: marketview
      POSTGRES_PASSWORD: marketview
      POSTGRES_DB: marketview
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketview"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pdf-parser:
    build:
      context: .
      dockerfile: Dockerfile.python
    ports:
      - "5003:5001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8084:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=marketview
      - DB_PASSWORD=marketview
      - DB_NAME=marketview
      - PARSER_URL=http://pdf-parser:5001
    depends_on:
      postgres:
        condition: service_healthy
      pdf-parser:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3005:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080
      - BACKEND_URL=http://backend:8080
    restart: unless-stopped

volumes:
  postgres_data:
